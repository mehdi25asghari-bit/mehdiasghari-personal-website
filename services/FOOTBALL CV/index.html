<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Create Your FOOTBALL CV - Mehdi Asghari</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <nav>
            <div class="menu">
                <div class="logo">
                    <a href="../../index.html">mehdi asgahri</a>
                </div>
                <ul>
                    <li><a href="../../index.html">home</a></li>
                    <li><a href="../../pages/index.html">about</a></li>
                    <li><a href="../index.html">services</a></li>
                    <li><a href="../../contact/index.html">contact</a></li>
                    <li><a href="mailto:mehdi25asghari@gmail.com?subject=Website%20Feedback">feedback</a></li>
                </ul>
            </div>
        </nav>

        <div class="container">
            <div class="form-section">
                <div class="section-header">
                    <h2>Create Your FOOTBALL CV</h2>
                    <div class="services-nav">
                        <a href="../index.html" class="nav-link">← All Services</a>
                        <a href="../planner/index.html" class="nav-link">Weekly Planner</a>
                    </div>
                </div>
                <form id="visitCardForm">
                    <div class="form-group">
                        <label for="photoInput">Photo:</label>
                        <input type="file" id="photoInput" name="photoInput" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label for="firstName">First Name:</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name:</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="age">Age:</label>
                        <input type="number" id="age" name="age" min="1" max="120" required>
                    </div>

                    <div class="form-group">
                        <label for="work">Position:</label>
                        <input type="text" id="work" name="work" placeholder="Midfilder/..." required>
                    </div>

                    <div class="form-group">
                        <label for="contact">contact</label>
                        <input type="text" id="contact" name="contact" placeholder="your number..." required >
                        <input type="text" id="contact" name="contact" placeholder="your email..." required >
                    </div>

                    <div class="form-group">
                        <label for="resume">Resume</label>
                        <textarea id="resume" name="resume" rows="5"
                            placeholder="/where did you play how many appearances/goals..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Generate FOOTBALL CV</button>
                </form>
            </div>

            <div class="card-section">
                <div id="visitCard" class="visit-card">
                    <div class="card-content">
                        <img id="cardPhoto" src="" alt="Profile Photo" class="card-photo" aria-hidden="true">
                        <div class="card-header">
                            <h1 id="cardName">Your Name</h1>
                            <p id="cardWork">Your Position</p>
                        </div>
                        <div class="card-body">
                            <p><strong>Age:</strong> <span id="cardAge">--</span></p>
                            <p><strong>Bio:</strong></p>
                            <p><strong>contact:</strong></p>
                            <p id="cardResume">Your bio will appear here...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>

</html>
